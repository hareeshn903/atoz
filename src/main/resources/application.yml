spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always